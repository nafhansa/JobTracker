<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobTracker Autofill</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { width: 340px; min-height: 200px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0a; color: #fafafa; }
      #root { width: 100%; }
      #error-fallback { display: none; padding: 20px; color: #ef4444; font-size: 13px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="error-fallback"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        var el = document.getElementById('error-fallback');
        el.style.display = 'block';
        el.textContent = 'Error: ' + msg;
      };
      window.onunhandledrejection = function(e) {
        var el = document.getElementById('error-fallback');
        el.style.display = 'block';
        el.textContent = 'Promise Error: ' + (e.reason && e.reason.message || e.reason);
      };
    </script>
    <script type="module" src="/src/popup/main.tsx"></script>
  </body>
</html>
